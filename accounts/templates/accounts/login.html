{% extends "base.html" %}

{% block title %}Iniciar Sesión — TurnoYa{% endblock %}

{% block content %}
<div class="container d-flex aling-items-center justify-content-center min-vh-100">
    <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title text-center">Iniciar Sesión</h2>
                {% if messages %}
                    <div class="row mb-3">
                        <div class="col">
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        </div>
                    </div>
                {% endif %}

                <form method="post" action="{% url 'accounts:login' %}" novalidate>
                    {% csrf_token %}
                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" id="floatingInput">
                        <label for="floatingInput">Usuario</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="floatingPassword">
                        <label for="floatingPassword">Contraseña</label>
                    </div>
                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-success btn-lg">Ingresar
                        </button>
                    </div>
                    <p class="text-center mb-0">¿No tienes una cuenta?
                        <a href="{%url 'accounts:register' %}">Regístrate aquí</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
